<!-- Checkout Modal -->
<div class="modal fade" id="checkoutModal" tabindex="-1" aria-labelledby="checkoutModalLabel" aria-hidden="true" style="z-index: 1060;">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: var(--border-radius-md); border: 2px solid var(--accent-gold); box-shadow: var(--shadow-hover);">
            <div class="modal-header" style="background-color: var(--primary-green); color: var(--white); border-bottom: 2px solid var(--accent-gold);">
                <h5 class="modal-title" id="checkoutModalLabel" style="font-family: var(--font-heading); font-weight: 700;">
                    <i class="bi bi-cart-check-fill me-2 text-warning"></i>Checkout Order
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <!-- Item Summary Card -->
                <div class="p-3 mb-4 rounded-3 d-flex justify-content-between align-items-center" style="background-color: rgba(11, 93, 59, 0.05); border: 1.5px solid rgba(11, 93, 59, 0.15);">
                    <div>
                        <h6 id="modal-item-name" class="mb-2 fw-bold text-green" style="color: var(--primary-green); font-size: 1.1rem;">Item Name</h6>
                        <div class="d-flex align-items-center">
                            <span class="text-muted me-2" style="font-size: 0.85rem;">Qty:</span>
                            <div class="input-group input-group-sm" style="width: 100px;">
                                <button class="btn btn-outline-secondary btn-sm py-0 fw-bold" type="button" id="qty-minus">-</button>
                                <input type="text" class="form-control text-center py-0 fw-bold" id="modal-item-quantity" value="1" readonly style="background: white; border-color: #ced4da;">
                                <button class="btn btn-outline-secondary btn-sm py-0 fw-bold" type="button" id="qty-plus">+</button>
                            </div>
                        </div>
                    </div>
                    <div class="text-end">
                        <span class="d-block text-muted mb-1" style="font-size: 0.8rem;">Total Price</span>
                        <span id="modal-item-price" class="fs-4 fw-bold" style="color: var(--accent-gold); font-family: var(--font-heading);">0.00 SAR</span>
                    </div>
                </div>

                <!-- Checkout Form -->
                <form id="checkout-form" method="POST" action="{% url 'create_order_ajax' %}">
                    {% csrf_token %}
                    <input type="hidden" id="modal-item-id" name="item_id">
                    <input type="hidden" id="modal-item-type" name="item_type">
                    <input type="hidden" id="modal-item-raw-price" name="raw_price">
                    
                    <div class="mb-3">
                        <label for="checkout-name" class="form-label fw-semibold" style="font-size: 0.9rem;">Your Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="checkout-name" name="name" required placeholder="Enter full name">
                    </div>
                    
                    <div class="mb-3">
                        <label for="checkout-phone" class="form-label fw-semibold" style="font-size: 0.9rem;">Phone Number <span class="text-danger">*</span></label>
                        <input type="tel" class="form-control" id="checkout-phone" name="phone" required placeholder="e.g. +966 50 123 4567">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" style="font-size: 0.9rem;">Service Type <span class="text-danger">*</span></label>
                        <div class="d-flex justify-content-between p-2 rounded-2" style="background-color: var(--light-neutral); border: 1px solid rgba(0,0,0,0.05);">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="delivery_option" id="option-dinein" value="Dine-In" checked>
                                <label class="form-check-label fw-semibold" for="option-dinein" style="font-size: 0.85rem; cursor: pointer;">Dine-In</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="delivery_option" id="option-takeaway" value="Takeaway">
                                <label class="form-check-label fw-semibold" for="option-takeaway" style="font-size: 0.85rem; cursor: pointer;">Takeaway</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="delivery_option" id="option-delivery" value="Delivery">
                                <label class="form-check-label fw-semibold" for="option-delivery" style="font-size: 0.85rem; cursor: pointer;">Delivery</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="checkout-location" id="location-label" class="form-label fw-semibold" style="font-size: 0.9rem;">Table Number <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="checkout-location" name="address_or_table" required placeholder="e.g. Table 5">
                    </div>

                    <!-- Actions -->
                    <div class="d-grid gap-2 mt-4">
                        <!-- Pay Online -->
                        <button type="button" id="pay-online-btn" class="btn btn-gold py-3 text-uppercase fw-bold" style="font-size: 0.85rem; letter-spacing: 0.5px;">
                            <i class="bi bi-credit-card-2-front-fill me-2"></i>Pay Online (Razorpay)
                        </button>
                        
                        <!-- Order via WhatsApp (COD/Cash fallback) -->
                        <button type="button" id="order-whatsapp-btn" class="btn btn-outline-success py-2 text-uppercase fw-bold text-success border-success" style="border: 2px solid; font-size: 0.8rem; letter-spacing: 0.5px;">
                            <i class="bi bi-whatsapp me-2"></i>Order & Cash Pay via WhatsApp
                        </button>
                    </div>
                </form>
                
                <!-- Feedback response notifications -->
                <div id="checkout-feedback" class="alert mt-3 d-none"></div>
            </div>
        </div>
    </div>
</div>
